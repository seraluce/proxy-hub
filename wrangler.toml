name = "proxy-hub"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV 缓存命名空间 (从 gh-proxy 复用)
kv_namespaces = [
    { binding = "GH_CACHE", id = "b944ad81eb904723b5eb29cccdf0f15b" }
]

# 可选: 自定义域名路由 (取消注释并填入你的域名)
# routes = [
#     { pattern = "proxy-hub.example.com/*", zone_name = "example.com" }
# ]